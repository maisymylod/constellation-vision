name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: Core tests + metrics calibration (no ML stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (core + dev; CPU, no torch)
        run: pip install -e ".[dev]"
      - name: Tests + coverage gate
        # Includes the metric-calibration tests: a perfect mask must score mean
        # IoU 1.0 and a background-only mask must score 0.0 on the defect classes.
        run: pytest --cov=constellation_vision --cov-report=term-missing --cov-fail-under=85
      - name: Regenerate data + drift check
        run: |
          python -m constellation_vision.data.generate
          python -m constellation_vision.data.drift

  train-eval:
    name: Train from scratch + IoU floor + regenerate eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install training stack (CPU torch + onnx)
        run: pip install -e ".[train,dev]"
      - name: Train, export ONNX, evaluate, enforce mean-IoU floor
        # `make train` raises a non-zero exit if mean IoU < CV_MIN_MEAN_IOU.
        run: python -m constellation_vision.train
      - name: Full test suite (includes the torch end-to-end pipeline test)
        run: pytest -q
      - name: Argus enrichment smoke test on a held-out frame
        run: python -m constellation_vision.enrich.argus_enrich
      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: artifacts/
